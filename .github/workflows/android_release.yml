name: Android Release Build

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build and Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ... (шаги setup-java, setup-flutter, cache, decode-keystore, pub-get остаются без изменений)
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.jks
        
      - name: Get Flutter dependencies
        run: flutter pub get
      
      # Этот шаг остается таким же, но теперь будет работать надежнее
      - name: Create google-services.json
        run: printf '%s\n' "${{ secrets.GOOGLE_SERVICES_JSON }}" > android/app/google-services.json

      - name: Build Release APK
        run: >
          flutter build apk --release
          --build-name=${{ github.ref_name }}
          --build-number=$(date +%s)
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
      
      - name: Rename APK
        run: |
          apk_name="PM.Journal-${{ github.ref_name }}.apk"
          mv build/app/outputs/flutter-apk/app-release.apk "build/app/outputs/flutter-apk/$apk_name"
          echo "APK_NAME=$apk_name" >> $GITHUB_ENV
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/${{ env.APK_NAME }}
          generate_release_notes: true